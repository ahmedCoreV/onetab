<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoreV · Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     BRAND — change this ONE value to match CoreV's brand color.
     Everything (accents, highlights, icon tiles) follows from it.
     ============================================================ */
  :root{
    --brand:        #243177;   /* CoreV brand blue (sampled from logo) */
    --brand-deep:   #1B2559;   /* darker shade for hover/press states */

    --ink:          #0E1422;   /* primary text */
    --ink-soft:     #5A6478;   /* secondary text */
    --line:         #E6E9F0;   /* hairlines / borders */
    --surface:      #FFFFFF;   /* card surface */
    --bg:           #F5F7FB;   /* page background */
    --bg-tint:      #EDF1FA;   /* subtle brand-tinted wash */

    --r:            16px;      /* card radius */
    --maxw:         1120px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 85% -10%, color-mix(in srgb, var(--brand) 12%, transparent), transparent 60%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    line-height:1.5;
  }

  .wrap{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }

  /* ---------- Header ---------- */
  header{ padding:54px 0 26px; }
  .topline{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    justify-content:space-between;
  }
  .brandmark{ display:flex; align-items:center; gap:15px; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-soft);
    border-left:1px solid var(--line); padding-left:15px;
  }
  .logo{
    width:42px; height:42px; border-radius:11px;
    background:linear-gradient(150deg, var(--brand), var(--brand-deep));
    display:grid; place-items:center;
    color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px;
    box-shadow:0 6px 18px color-mix(in srgb, var(--brand) 35%, transparent);
  }
  /* CoreV brand lockup — embedded so it travels with the file */
  .logo-img{
    height:52px; width:auto; max-width:230px; object-fit:contain; display:block;
    border-radius:10px; box-shadow:0 6px 20px color-mix(in srgb, var(--brand) 30%, transparent);
  }
  .brandmark .name{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:21px; letter-spacing:-.01em;
  }
  .brandmark .sub{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-soft); margin-top:1px;
  }

  /* search */
  .search{
    position:relative; flex:1 1 280px; max-width:380px;
  }
  .search input{
    width:100%; height:46px; border:1px solid var(--line); border-radius:12px;
    background:var(--surface); padding:0 44px 0 44px;
    font-family:'Inter',sans-serif; font-size:15px; color:var(--ink);
    transition:border-color .15s, box-shadow .15s;
  }
  .search input::placeholder{ color:var(--ink-soft); }
  .search input:focus{
    outline:none; border-color:var(--brand);
    box-shadow:0 0 0 4px color-mix(in srgb, var(--brand) 14%, transparent);
  }
  .search .ico{ position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--ink-soft); pointer-events:none; }
  .search .kbd{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft);
    border:1px solid var(--line); border-radius:6px; padding:2px 7px; background:var(--bg);
  }

  .lead{ margin-top:30px; max-width:640px; }
  .lead h1{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(28px,4.4vw,42px);
    letter-spacing:-.025em; line-height:1.08;
  }
  .lead p{ margin-top:12px; color:var(--ink-soft); font-size:16px; }

  /* ---------- Filter bar ---------- */
  .controls{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin:30px 0 8px; padding-bottom:18px; border-bottom:1px solid var(--line);
  }
  .chip{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500;
    border:1px solid var(--line); background:var(--surface); color:var(--ink-soft);
    padding:8px 15px; border-radius:999px; cursor:pointer;
    transition:all .15s;
  }
  .chip:hover{ border-color:color-mix(in srgb, var(--brand) 40%, var(--line)); color:var(--ink); }
  .chip[aria-pressed="true"]{
    background:var(--brand); border-color:var(--brand); color:#fff;
  }
  .count{
    margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:12.5px;
    color:var(--ink-soft); letter-spacing:.04em;
  }

  /* ---------- Sections + grid ---------- */
  .group{ margin-top:34px; }
  .group.is-hidden{ display:none; }
  .group h2{
    font-family:'JetBrains Mono',monospace; font-weight:500; font-size:12px;
    letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft);
    margin-bottom:16px; display:flex; align-items:center; gap:12px;
  }
  .group h2::after{ content:""; flex:1; height:1px; background:var(--line); }

  .grid{
    display:grid; gap:16px;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  }

  /* ---------- Tool card ---------- */
  .card{
    position:relative; display:flex; flex-direction:column; gap:14px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    padding:20px; text-decoration:none; color:inherit;
    transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s, border-color .18s;
    will-change:transform;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:color-mix(in srgb, var(--brand) 45%, var(--line));
    box-shadow:0 14px 34px -16px color-mix(in srgb, var(--brand) 50%, transparent);
  }
  .card:focus-visible{
    outline:none; border-color:var(--brand);
    box-shadow:0 0 0 4px color-mix(in srgb, var(--brand) 16%, transparent);
  }
  .card.is-filtered{ display:none; }

  .card .head{ display:flex; align-items:center; justify-content:space-between; }
  .tile{
    width:44px; height:44px; border-radius:11px; display:grid; place-items:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:#fff;
    background:linear-gradient(150deg, var(--brand), var(--brand-deep));
  }
  .tile-logo{
    padding:8px; background:#fff; border:1px solid var(--line); object-fit:contain;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
  }
  .ext{
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--brand);
    border:1px solid color-mix(in srgb, var(--brand) 35%, var(--line));
    background:var(--bg-tint); border-radius:6px; padding:3px 8px;
  }
  .card h3{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17.5px; letter-spacing:-.01em; }
  .card p{ color:var(--ink-soft); font-size:14px; margin-top:-6px; }

  .open{
    margin-top:auto; display:flex; align-items:center; gap:7px;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.05em;
    color:var(--brand); font-weight:500;
  }
  .open svg{ transition:transform .18s; }
  .card:hover .open svg{ transform:translate(2px,-2px); }

  /* ---------- Empty state ---------- */
  .empty{
    display:none; text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty.show{ display:block; }
  .empty strong{ display:block; font-family:'Space Grotesk',sans-serif; color:var(--ink); font-size:18px; margin-bottom:6px; }

  /* ---------- Footer ---------- */
  footer{
    margin-top:56px; padding:26px 0 50px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    color:var(--ink-soft); font-size:13px;
  }
  footer .mono{ font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.05em; }

  /* placeholder-link notice */
  .notice{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--bg-tint); border:1px solid color-mix(in srgb, var(--brand) 25%, var(--line));
    border-radius:12px; padding:13px 16px; margin-top:22px; font-size:13.5px; color:var(--ink);
  }
  .notice b{ color:var(--brand-deep); }

  /* entrance */
  @media (prefers-reduced-motion:no-preference){
    .card{ animation:rise .5s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes rise{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  }

  @media (max-width:560px){
    header{ padding-top:34px; }
    .topline{ gap:18px; }
    .search{ order:3; max-width:none; }
  }
</style>
</head>

<script>
  /* ============================================================

    { name:'OxeFit Sales Performance',      cat:'Sales & CRM',  mono:'SP', desc:'Track sales targets and rep performance.',     url:'https://ahmedcorev.github.io/sales/' },

    { name:'Marketing Lead Tracker',        cat:'Sales & CRM',  mono:'ML', domain:'docs.google.com', desc:'Shared sheet of marketing leads.',            url:'https://docs.google.com/spreadsheets/d/1we16JoRA43pVW5UpGajqDeKvWyQ5TyNQYUukpH3cY4I/edit?gid=0' },
    { name:'Referral Program',              cat:'Sales & CRM',  mono:'RP', domain:'core-velocity.com', desc:'CoreV referral program details.',            url:'https://www.core-velocity.com/referral-program' },
    { name:'Referral Payout',               cat:'Sales & CRM',  mono:'PO', domain:'core-velocity.com', desc:'Track and manage referral payouts.',         url:'https://www.core-velocity.com/sales-admin' },
    { name:'QuickBooks',                    cat:'Finance',      mono:'QB', domain:'quickbooks.intuit.com', desc:'Accounting, invoices, and bookkeeping.',       url:'https://accounts.intuit.com/app/sign-in?app_group=QBO&asset_alias=Intuit.accounting.core.qbowebapp&app_environment=prod&iux_redirect_reason=UNAUTHENTICATED' },
    { name:'OxeFit Finance Portal',         cat:'Finance',      mono:'FN', desc:'Budgets, reports, and financial controls.',    url:'https://ahmedcorev.github.io/Finance/' },
    { name:'OxeFit HR Portal',              cat:'People',       mono:'HR', desc:'Leave, payroll info, and people records.',     url:'https://ahmedcorev.github.io/CoreVHR/' },
    { name:'OxeFit Delivery & Spares',      cat:'Operations',   mono:'DS', desc:'Track deliveries and order spare parts.',      url:'https://ahmedcorev.github.io/CoreVDelivery/' },
    { name:'Sprintful — Demo Calendar',     cat:'Operations',   mono:'SF', domain:'sprintful.com', desc:'Schedule and manage product demos.',           url:'https://app.sprintful.com/dashboard' },
    { name:'DocuSign',                      cat:'Operations',   mono:'DC', domain:'docusign.com', desc:'Send and sign documents electronically.',      url:'https://account.docusign.com/oauth/auth?response_type=code&scope=all%20click.manage%20me_profile%20room_forms%20room_fields%20inproductcommunication_read%20data_explorer_signing_insights%20notary_read%20notary_write%20search_read%20search_write%20webforms_manage%20dtr%20valmod_manage%20spring_read%20spring_write%20signature&client_id=2CC56DC9-4BCD-4B55-8AB0-8BA60BAE1065&redirect_uri=https%3A%2F%2Fapps.docusign.com%2Fauthenticate&state=%7B%22widgetId%22%3A%22%40ds%2Fsend%22%2C%22xsrfToken%22%3A%22qw4TQAWng74DOJtCXFq8jR6sohkfWUKSPwkgvtY%2Bs0U5DyYyoyNbH3NZ6x9%2FHopKV%2BNLziJieQuMUWoS9H8iteJN%2FcY9IvmDuI5lizM%2BB5Es16lbDSENqdceqOjoB%2BhtYyADd4RklON5py3qRJX13KGEmbyWtPJmH8Lt30MhcOs%3D%22%2C%22redirectUri%22%3A%22%2Fsend%2Fdocuments%22%2C%22authTxnId%22%3A%22e1daaca4-824d-4359-94e5-7de0f5a1658f%22%7D', external:true },
    { name:'UniFi',                         cat:'Operations',   mono:'UN', domain:'ui.com', desc:'Network and security camera dashboard.',       url:'https://unifi.ui.com/consoles/0CEA1480D5A500000000088CC43F000000000901822400000000674F1254:320067752/protect/dashboard' },
    { name:'Shopify',                       cat:'Operations',   mono:'SH', domain:'shopify.com', desc:'Online store, orders, and products.',          url:'https://accounts.shopify.com/select?rid=eab60b8f-2f6e-4383-a5c3-33a67a41bf3b', external:true },
    { name:'QR Code Generator',             cat:'Operations',   mono:'QR', domain:'qr-code-generator.com', desc:'Create and manage QR codes.',                  url:'https://login.qr-code-generator.com/' },
    { name:'Hexnode',                       cat:'Operations',   mono:'HX', domain:'hexnode.com', desc:'Device and mobile fleet management.',         url:'https://core-velocity.hexnodemdm.com/login/?next=/' },
    { name:'Apple Business Portal',         cat:'Operations',   mono:'AP', domain:'apple.com', desc:'Manage company Apple devices and apps.',      url:'https://business.apple.com' },
    { name:'GoDaddy',                       cat:'Operations',   mono:'GD', domain:'godaddy.com', desc:'Web hosting and domains.',                    url:'https://www.godaddy.com/en' },
    { name:'Wix',                           cat:'Operations',   mono:'WX', domain:'wix.com', desc:'Website builder and domain hosting.',         url:'https://manage.wix.com/account/websites?referralAdditionalInfo=Route' },
  ];

  const ORDER = ['Sales & CRM','Finance','People','Operations'];
  const board = document.getElementById('board');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const qEl = document.getElementById('q');

  const arrow = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>';

  function render(){
    board.innerHTML = '';
    ORDER.forEach((cat, gi) => {
      const items = TOOLS.filter(t => t.cat === cat);
      if(!items.length) return;
      const group = document.createElement('section');
      group.className = 'group';
      group.dataset.cat = cat;
      group.innerHTML = `<h2>${cat}</h2><div class="grid"></div>`;
      const grid = group.querySelector('.grid');
      items.forEach((t, i) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = t.url;
        if(t.url !== '#'){ a.target = '_blank'; a.rel = 'noopener'; }
        a.style.animationDelay = ((gi*0.05)+(i*0.04)) + 's';
        a.dataset.name = t.name.toLowerCase();
        a.dataset.desc = t.desc.toLowerCase();
        a.dataset.cat = cat;
        a.setAttribute('aria-label', 'Open ' + t.name);
        a.innerHTML = `
          <div class="head">
            ${t.domain
              ? `<img class="tile tile-logo" alt="" loading="lazy" src="https://www.google.com/s2/favicons?domain=${t.domain}&sz=128" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'tile',textContent:'${t.mono}'}))">`
              : `<div class="tile">${t.mono}</div>`}
            ${t.external ? '<span class="ext">External</span>' : ''}
          </div>
          <h3>${t.name}</h3>
          <p>${t.desc}</p>
          <span class="open">Open ${arrow}</span>`;
        grid.appendChild(a);
      });
      board.appendChild(group);
    });
  }

  let activeFilter = 'all';

  function apply(){
    const term = qEl.value.trim().toLowerCase();
    let shown = 0;
    document.querySelectorAll('.group').forEach(group => {
      let groupShown = 0;
      group.querySelectorAll('.card').forEach(card => {
        const okCat = activeFilter === 'all' || card.dataset.cat === activeFilter;
        const okTerm = !term || card.dataset.name.includes(term) || card.dataset.desc.includes(term) || card.dataset.cat.toLowerCase().includes(term);
        const show = okCat && okTerm;
        card.classList.toggle('is-filtered', !show);
        if(show){ groupShown++; shown++; }
      });
      group.classList.toggle('is-hidden', groupShown === 0);
    });
    countEl.textContent = shown + (shown === 1 ? ' tool' : ' tools');
    emptyEl.classList.toggle('show', shown === 0);
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed','false'));
      chip.setAttribute('aria-pressed','true');
      activeFilter = chip.dataset.filter;
      apply();
    });
  });

  qEl.addEventListener('input', apply);

  document.addEventListener('keydown', (e) => {
    if(e.key === '/' && document.activeElement !== qEl){ e.preventDefault(); qEl.focus(); }
    if(e.key === 'Escape' && document.activeElement === qEl){ qEl.value = ''; qEl.blur(); apply(); }
  });

  document.getElementById('stamp').textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();

  render();
  apply();
</script>
